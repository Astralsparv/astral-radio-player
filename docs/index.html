<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="iconlibrary.css">
    <link rel="stylesheet" href="flag.css">
    <title>Astral Radio Player</title>
    <link rel="shortcut icon" href="default_icon.png">
</head>
<body>
    <audio id="player"></audio>
    <h1>Astral Radio Player 🦕</h1>
    <div class="list" id="countries"></div>
    <div class="list hide" id="stations"></div>

    <div id="mini-player">
        <img id="player-favicon" src="" alt="favicon" onerror="this.src='default_icon.png'">
        <div style="flex-grow:1; overflow:hidden;">
            <div id="player-title">No Station</div>
            <div id="player-country">No Country</div>
        </div>
        <button id="player-toggle">▶️</button>
    </div>

    <script src="favourite.js"></script>
    <script src="index.js"></script>
</body>
</html>
